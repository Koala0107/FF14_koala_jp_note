<!DOCTYPE html>

<!-- 디자인 -->

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", "Noto Sans JP", sans-serif;
    background:#cfefff;
}

.fixed-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #cfefff;
    width: 100%;
    max-width: 100vw;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: #cfefff;
    border-bottom: 2px solid #a8dcff;
    width: 100%;
    height: 50px;
    box-sizing: border-box;
    align-items: center;
}

.menu button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#e8f7ff;
    cursor:pointer;
    font-weight:bold;
}

.menu button.active{
    background:#8fd4ff;
}

.page{
    display:none;
    padding: 20px 25px 60vh 25px;
}

.page.active{
    display:block;
}

h1{
    font-size:32px;
    margin-top: 0;
    margin-bottom: 8px;
}

.sub{
    font-size:20px;
    font-weight:800;
    margin-bottom:8px;
    scroll-margin-top: 200px;
}

.line{
    height:2px;
    background:#8fd4ff;
    margin:12px 0 20px 0;
}

.row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:20px;
}

.copy-btn{
    padding:8px 34px 8px 12px;
    border:1px solid #9fdcff;
    background:#e8f7ff;
    border-radius:8px;
    cursor:pointer;
    text-align:center;
    line-height:1.3;
}

.copy-btn:hover{
    background:#a6ddff;
    border-color:#6bc6ff;
}

.kr{
    font-weight:bold;
}

#toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#8fd4ff;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:9999;
}

.submenu {
    display: none;
    background: #cfefff;
    padding: 10px 25px;
    border-bottom: 1px solid #a8dcff;
    gap: 8px;
    flex-wrap: wrap; 
    justify-content: center;
    width: 100%;
    box-sizing: border-box;
}

.submenu.active{
    display:flex;
}

.submenu button{
    background:#56a8ff;
    border:none;
    border-radius:8px;
    padding:6px 12px;
    font-weight:bold;
    cursor:pointer;
}
html{
    scrollbar-gutter:stable;
}

.fav {
    position: absolute;
    top: 50%;
    right: 8px;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.copy-wrap{position:relative;display:inline-block}
</style>
</head>

<script>
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");
let toastTimeout;

function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.style.opacity = "1";

    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
        toast.style.opacity = "0";
    }, 1200);
}

function renderFavorites(){
 const c=document.getElementById("favorites-container"); if(!c)return; c.innerHTML="";
 
 favorites.forEach(id => {
     const originalBtn = document.querySelector(`.page .copy-btn[data-fav-id="${id}"]`);
     if (originalBtn) {
         const cloneWrap = originalBtn.parentElement.cloneNode(true);
         const cloneStar = cloneWrap.querySelector(".fav");
         if(cloneStar) {
             cloneStar.onclick = (e) => toggleFavorite(e, id);
         }
         c.appendChild(cloneWrap);
     }
 });
 updateStars();
}

function toggleFavorite(e,id){
    e.stopPropagation();
    
    if (favorites.includes(id)) {
        favorites = favorites.filter(x => x != id);
        showToast("즐겨찾기가 해제되었습니다!");
    } else {
        favorites = [...favorites, id];
        showToast("즐겨찾기에 추가되었습니다!");
    }
    
    localStorage.setItem("favorites",JSON.stringify(favorites));
    renderFavorites();
}

function updateStars(){
    document.querySelectorAll(".fav").forEach(s=>{
        s.textContent=favorites.includes(s.dataset.id)?"★":"☆";
        s.style.color=favorites.includes(s.dataset.id)?"gold":"#999";
    });
}

window.addEventListener("DOMContentLoaded",()=>{
 let i=0;
 document.querySelectorAll(".copy-btn").forEach(b=>{
   const w=document.createElement("div");w.className="copy-wrap";b.parentNode.insertBefore(w,b);w.appendChild(b);
   const id="fav"+(++i);b.dataset.favId=id;
   const star=document.createElement("button");star.className="fav";star.dataset.id=id;star.onclick=(e)=>toggleFavorite(e,id);w.appendChild(star);
 });
 renderFavorites();
});

function copy(text){
    navigator.clipboard.writeText(text);
    showToast("복사 완료!");
}

function show(id,btn){
    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.menu button').forEach(b=>{
        b.classList.remove('active');
    });
    btn.classList.add('active');

    const subMenu = document.getElementById('chat-menu');
    if(id === 'chat'){
        subMenu.classList.add('active');
    } else {
        subMenu.classList.remove('active');
    }
}

function gotoSection(id){
    const chatPage = document.getElementById('chat');
    if (!chatPage.classList.contains('active')) {
        const chatBtn = document.getElementById('main-btn-chat');
        show('chat', chatBtn);
    }

    setTimeout(() => {
        document.getElementById(id).scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    }, 50);
}
</script>

<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>코알라의 FF14 일본어 노트</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", "Noto Sans JP", sans-serif;
    background:#cfefff;
}

.fixed-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #cfefff;
    width: 100%;
    max-width: 100vw;
    overflow-x: hidden; 
    box-sizing: border-box;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: #cfefff;
    border-bottom: 2px solid #a8dcff;
    width: 100%;
    height: 50px;
    box-sizing: border-box;
    align-items: center;
}

.menu button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#e8f7ff;
    cursor:pointer;
    font-weight:bold;
}

.menu button.active{
    background:#8fd4ff;
}

.page{
    display:none;
    padding: 20px 25px 60vh 25px;
}

.page.active{
    display:block;
}

h1{
    font-size:32px;
    margin-top: 0;
    margin-bottom: 8px;
}

.sub{
    font-size:20px;
    font-weight:800;
    margin-bottom:8px;
    scroll-margin-top: 160px;
}

.line{
    height:2px;
    background:#8fd4ff;
    margin:12px 0 20px 0;
}

.row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:20px;
}

.copy-btn{
    padding:8px 12px;
    border:1px solid #9fdcff;
    background:#e8f7ff;
    border-radius:8px;
    cursor:pointer;
    text-align:center;
    line-height:1.3;
}

.copy-btn:hover{
    background:#a6ddff;
    border-color:#6bc6ff;
}

.kr{
    font-weight:bold;
}

#toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#8fd4ff;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:9999;
}

.submenu {
    display: none;
    background: #cfefff;
    padding: 10px 25px;
    border-bottom: 1px solid #a8dcff;
    gap: 8px;
    flex-wrap: wrap; 
    justify-content: center;
    width: 100%;
    box-sizing: border-box;
}

.submenu.active{
    display:flex;
}

.submenu button{
    background:#56a8ff;
    border:none;
    border-radius:8px;
    padding:6px 12px;
    font-weight:bold;
    cursor:pointer;
}
html{
    scrollbar-gutter:stable;
}

</style>
</head>

<div id="toast">복사 완료!</div>

<div class="fixed-header">

        <button onclick="show('term',this)">용어</button>
        <button onclick="show('emoji',this)">이모티콘</button>

        <button onclick="gotoSection('leave')">파티 퇴장</button>
        <button onclick="gotoSection('afk')">자리비움</button>

        <button onclick="gotoSection('party')">파티 진행</button>
        <button onclick="gotoSection('last')">리트 & 라스트</button>

</div>

<script>
function copy(text){
    navigator.clipboard.writeText(text);

    const toast = document.getElementById("toast");
    toast.style.opacity = "1";

    setTimeout(()=>{
        toast.style.opacity = "0";
    },1200);
}

function show(id,btn){
    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.menu button').forEach(b=>{
        b.classList.remove('active');
    });
    btn.classList.add('active');

    const subMenu = document.getElementById('chat-menu');
    if(id === 'chat'){
        subMenu.classList.add('active');
    } else {
        subMenu.classList.remove('active');
    }
}

function gotoSection(id){
    const chatPage = document.getElementById('chat');
    if (!chatPage.classList.contains('active')) {
        const chatBtn = document.getElementById('main-btn-chat');
        show('chat', chatBtn);
    }

    setTimeout(() => {
        document.getElementById(id).scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    }, 50);
}
</script>
